# MySQL database URL + database name

spring.datasource.url=jdbc:mysql://127.0.0.1:3306/numl?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC

# MySQL username

spring.datasource.username=root

# MySQL password

spring.datasource.password=malik

# JDBC driver

spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Hibernate auto update tables

spring.jpa.hibernate.ddl-auto=update

# Show SQL queries in console

spring.jpa.show-sql=true

# Recommended (avoid warnings)

spring.jpa.open-in-view=false
